services:
  server:
    image: ghcr.io/nc1107/echo-messenger/server:${SERVER_VERSION:?SERVER_VERSION must be set to a published release tag (no 'latest' fallback)}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://echo:${DB_PASSWORD}@postgres:5432/echo_prod
      JWT_SECRET: ${JWT_SECRET}
      RUST_LOG: echo_server=info
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      APNS_KEY_ID: ${APNS_KEY_ID}
      APNS_TEAM_ID: ${APNS_TEAM_ID}
      APNS_AUTH_KEY_BASE64: ${APNS_AUTH_KEY_BASE64}
      APNS_TOPIC: ${APNS_TOPIC:-us.echomessenger.app}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.echo-api.rule=Host(`echo-messenger.us`) && (PathPrefix(`/api`) || PathPrefix(`/ws`))"
      - "traefik.http.routers.echo-api.priority=100"
      - "traefik.http.routers.echo-api.tls=true"
      - "traefik.http.routers.echo-api.tls.certresolver=cloudflare"
      - "traefik.http.services.echo-api.loadbalancer.server.port=8080"
    networks:
      - traefik
      - echo-internal

  web:
    image: ghcr.io/nc1107/echo-messenger/web:${WEB_VERSION:?WEB_VERSION must be set to a published release tag (no 'latest' fallback)}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.echo-web.rule=Host(`echo-messenger.us`)"
      - "traefik.http.routers.echo-web.priority=1"
      - "traefik.http.routers.echo-web.tls=true"
      - "traefik.http.routers.echo-web.tls.certresolver=cloudflare"
      - "traefik.http.services.echo-web.loadbalancer.server.port=80"
    networks:
      - traefik

  postgres:
    image: postgres:17.6
    restart: unless-stopped
    environment:
      POSTGRES_DB: echo_prod
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echo -d echo_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - echo-internal

  livekit:
    image: livekit/livekit-server:v1.10.1
    restart: unless-stopped
    # Signaling (7880) is bound to localhost only -- public access must go
    # through Traefik with TLS via the labels below.  Direct 0.0.0.0 binding
    # bypassed TLS termination and let anyone hit the API-key surface.
    # Media TURN/UDP ports remain public; deploy docs must require
    # `ufw allow 7881/tcp,7882/udp,50000:50200/udp` on the host.
    #
    # DEPLOY NOTE: this requires a DNS A record for livekit.echo-messenger.us
    # pointing at this host *and* the client's LiveKit URL configured to
    # `wss://livekit.echo-messenger.us`.  Until both are in place, voice/video
    # connectivity will fail.  Reverting to public 7880 must not be done.
    ports:
      - "127.0.0.1:7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
      - "50000-50200:50000-50200/udp"
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: ["--config", "/etc/livekit.yaml"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.echo-livekit.rule=Host(`livekit.echo-messenger.us`)"
      - "traefik.http.routers.echo-livekit.tls=true"
      - "traefik.http.routers.echo-livekit.tls.certresolver=cloudflare"
      - "traefik.http.services.echo-livekit.loadbalancer.server.port=7880"
    networks:
      - traefik
      - echo-internal

  # Watchtower removed: auto-pulling `latest` every 5 minutes risks deploying
  # broken builds with zero human review.  Pin image versions via SERVER_VERSION
  # and WEB_VERSION env vars and deploy manually or via CI/CD.
  # To update:
  #   SERVER_VERSION=v1.2.3 WEB_VERSION=v1.2.3 docker compose pull && docker compose up -d

  backup:
    image: prodrigestivill/postgres-backup-local:17.6
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: echo_prod
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8081
    volumes:
      - backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - echo-internal

volumes:
  pgdata:
  uploads:
  backups:

networks:
  traefik:
    external: true
  echo-internal:
