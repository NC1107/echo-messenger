services:
  postgres:
    image: postgres:17.6
    environment:
      POSTGRES_DB: echo_dev
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echo -d echo_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
