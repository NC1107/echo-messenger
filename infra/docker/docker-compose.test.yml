services:
  postgres-test:
    image: postgres:17
    environment:
      POSTGRES_DB: echo_test
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echo -d echo_test"]
      interval: 3s
      timeout: 3s
      retries: 10
