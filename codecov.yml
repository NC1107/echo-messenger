coverage:
  status:
    project:
      default:
        target: 60%
        threshold: 2%
        informational: false
    patch:
      default:
        target: 70%
        threshold: 5%
        informational: false

comment:
  layout: "reach,diff,flags,components"
  behavior: default

flags:
  flutter:
    paths:
      - apps/client/
    carryforward: true
