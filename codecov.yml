coverage:
  status:
    # Targets are aspirational. Marked informational while real coverage
    # ratchets up from the current ~40% baseline (#671). Flip to
    # informational: false once we hit each threshold.
    project:
      default:
        target: 60%
        threshold: 2%
        informational: true
    patch:
      default:
        target: 70%
        threshold: 5%
        informational: true

comment:
  layout: "reach,diff,flags,components"
  behavior: default

component_management:
  individual_components:
    - component_id: ratchet
      name: Ratchet/Signal Protocol
      paths:
        - apps/client/lib/src/services/signal_*.dart
        - apps/client/lib/src/services/crypto_*.dart
      status:
        project:
          target: 60%
          threshold: 5%
          informational: true
        patch:
          target: 70%
          threshold: 5%
          informational: true

flags:
  flutter:
    paths:
      - apps/client/
    carryforward: true
