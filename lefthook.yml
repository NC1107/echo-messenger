pre-commit:
  parallel: true
  commands:
    rust-fmt:
      glob: "*.rs"
      run: cargo fmt --all -- --check
    rust-clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --all-targets -- -D warnings
    dart-format:
      glob: "*.dart"
      run: cd apps/client && dart format --set-exit-if-changed .
    flutter-analyze:
      glob: "*.dart"
      run: cd apps/client && flutter analyze --fatal-infos

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
