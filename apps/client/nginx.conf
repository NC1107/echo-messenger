server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Flutter bootstrap and main JS - short cache so updates deploy fast
    location ~* (flutter_bootstrap\.js|main\.dart\.js|flutter_service_worker\.js|index\.html)$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # Static assets with content hash in filename - cache aggressively
    location ~* \.(png|jpg|jpeg|gif|ico|wasm|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
