log_format echo_combined '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" "$http_x_forwarded_for"';

# Silence in-container probes (host healthcheck, docker HEALTHCHECK, uptime
# checkers) so 30-second pings don't drown real traffic in the access log.
map $http_user_agent $loggable {
    default                 1;
    "~*^(Wget|curl|kube-probe|Docker-HealthCheck|GoogleHC)" 0;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log echo_combined if=$loggable;

    # Dedicated healthcheck: returns 200 with no logging.  Use this for
    # docker HEALTHCHECK, Traefik backend probes, and external uptime tests.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Browsers (Firefox especially) still hit /favicon.ico as a fallback even
    # when <link rel="icon"> tags point at favicon.png.  Without this map,
    # the request falls through to /index.html (SPA fallback) which the
    # browser then tries to render as an image and fails with a 404 + CSP
    # noise (#732).  Serve favicon.png for the legacy .ico path.
    location = /favicon.ico {
        alias /usr/share/nginx/html/favicon.png;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, max-age=86400";
    }

    # Allow camera, microphone, and screen-share for WebRTC voice/video.
    # Without this, some browsers/proxies silently deny getUserMedia and
    # getDisplayMedia without ever prompting the user.
    add_header Permissions-Policy "camera=*, microphone=*, display-capture=*" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy tuned for Flutter CanvasKit web builds.
    # - script-src: 'self' + 'wasm-unsafe-eval' for CanvasKit WASM.
    #   We deliberately do NOT allow 'unsafe-inline' for scripts:
    #   flutter_bootstrap.js is an external file, so any injected inline
    #   <script> is blocked (the main XSS mitigation).
    # - style-src: 'unsafe-inline' is required -- Flutter injects dynamic
    #   inline styles for text rendering.
    # - worker-src blob: required for CanvasKit worker threads.
    # - connect-src wss:/https: covers WebSocket, API, and LiveKit media.
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss: https:; img-src 'self' https: data: blob:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline'; script-src 'self' 'wasm-unsafe-eval'; media-src 'self' blob:; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Entry point + version: never cache at CDN or browser — always revalidate from origin
    location ~* (index\.html|version\.txt)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Flutter JS assets: short cache (content-hashed filenames handle cache busting)
    location ~* (flutter_bootstrap\.js|main\.dart\.js)$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # Static assets with content hash in filename - cache aggressively
    location ~* \.(png|jpg|jpeg|gif|ico|wasm|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
