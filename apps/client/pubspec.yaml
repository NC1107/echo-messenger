name: echo_app
description: Decentralized encrypted messenger
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.0
  go_router: ^14.0.0
  http: ^1.3.0
  http_parser: ^4.1.0
  web_socket_channel: ^3.0.0
  cryptography: ^2.7.0
  shared_preferences: ^2.3.0
  google_fonts: ^6.2.0
  url_launcher: ^6.3.0
  file_picker: ^8.0.0
  qr_flutter: ^4.1.0
  audioplayers: ^6.1.0
  web: ^1.1.0
  flutter_webrtc: ^0.12.0
  livekit_client: ^2.3.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
