name: echo_app
description: Decentralized encrypted messenger
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.0
  go_router: ^17.2.2
  http: ^1.3.0
  http_parser: ^4.1.0
  web_socket_channel: ^3.0.0
  cryptography: ^2.7.0
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^10.0.0
  google_fonts: ^8.1.0
  url_launcher: ^6.3.0
  file_picker: ^11.0.2
  qr_flutter: ^4.1.0
  audioplayers: ^6.1.0
  record: ^6.2.0
  web: ^1.1.0
  flutter_webrtc: 1.4.0
  dart_webrtc: ^1.8.1
  livekit_client: ^2.7.0
  video_player: ^2.9.2
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  flutter_local_notifications: ^21.0.0
  path: ^1.9.0
  path_provider: ^2.1.0
  emoji_picker_flutter: ^4.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  photo_manager: ^3.6.0
  tray_manager: ^0.5.2
  window_manager: ^0.5.1
  local_auth: ^3.0.1
  desktop_drop: ^0.7.1
  flutter_slidable: ^3.1.1
  # Inline YouTube playback. Backed by webview_flutter which supports
  # iOS / Android / Web / macOS. On Linux + Windows desktop where webview
  # support is limited, the YouTubeEmbed widget falls back to the static
  # thumbnail card.
  youtube_player_iframe: ^5.2.0
  # On web the YouTube iframe sits below the Flutter pointer-capture layer,
  # so taps don't reach it. PointerInterceptor lets pointer events pass
  # through to the underlying iframe element. No-op on native platforms.
  pointer_interceptor: ^0.10.1+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_async: ^1.3.1
  mockito: ^5.4.4
  mocktail: ^1.0.4
  build_runner: ^2.4.8
  integration_test:
    sdk: flutter
  network_image_mock: ^2.1.1
  path_provider_platform_interface: ^2.1.0
  plugin_platform_interface: ^2.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/

dependency_overrides:
  # Stub out broken record_linux — voice recording is mobile/web only.
  record_linux:
    path: record_linux_stub
  # connectivity_plus 7.x uses NWPath.isUltraConstrained which requires
  # the macOS 26 SDK (Xcode 26). GitHub macOS-15 runners ship Xcode 16.4
  # with macOS 15.5 SDK, so pin to 6.x until runners upgrade.
  connectivity_plus: ^6.1.5
