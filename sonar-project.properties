sonar.projectKey=NC1107_echo-messenger
sonar.organization=nc1107

# Sources
sonar.sources=apps/server/src,apps/client/lib,core/rust-core/src
sonar.tests=apps/server/src,apps/client/test,core/rust-core/src
sonar.test.inclusions=**/*_test.dart,**/*_test.rs,**/tests/**

# Exclusions
sonar.exclusions=**/build/**,**/target/**,**/.dart_tool/**,**/generated/**,**/*.g.dart,**/*.freezed.dart

# Coverage (imported from CI artifacts)
sonar.dart.lcov.reportPaths=apps/client/coverage/lcov.info
