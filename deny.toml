[graph]
all-features = true

[advisories]
version = 2
ignore = [
    # rand 0.8.5 unsound advisory. sqlx 0.8.6 pins rand 0.8.5 transitively
    # via sqlx-postgres and sqlx-mysql. No sqlx 0.9 available yet.
    # Advisory conditions (custom logger + rand::rng() reseed) don't apply to sqlx usage.
    "RUSTSEC-2026-0097",
    # rustls-webpki CRL parsing panic. Pulled in transitively via reqwest 0.13 -> rustls.
    # Echo does not use CRL verification, so this code path is unreachable.
    "RUSTSEC-2026-0104",
    # Marvin Attack timing sidechannel in rsa crate. Pulled in via jsonwebtoken 10
    # (rust_crypto feature) -> rsa 0.9.10. No safe upgrade available; Echo uses
    # HS256 (HMAC-SHA256) for JWT, not RSA, so the affected RSA code path is unused.
    "RUSTSEC-2023-0071",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]

# PolyForm Noncommercial 1.0.0 is the project's own license. SPDX has no
# canonical identifier for it so cargo-deny treats it as "unknown" — we
# exception it for first-party crates only, so any future non-commercial
# dependency won't silently slip through.
[[licenses.exceptions]]
name = "echo-core"
allow = ["LicenseRef-PolyForm-Noncommercial-1.0.0"]

[[licenses.exceptions]]
name = "echo-server"
allow = ["LicenseRef-PolyForm-Noncommercial-1.0.0"]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Path dependencies can use wildcard versions; they're local-only and never
# fetched from a registry, so the wildcard ban (which targets unbounded
# registry deps) doesn't apply. Without this the workspace `echo-core` path
# dep needs a version pin that has to be sed-rewritten by the release
# pipeline alongside the package's own version, which is awkward.
allow-wildcard-paths = true
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
