[graph]
all-features = true

[advisories]
version = 2
ignore = [
    # rand 0.8.5 unsound advisory. sqlx 0.8.6 pins rand 0.8.5 transitively
    # via sqlx-postgres and sqlx-mysql. No sqlx 0.9 available yet.
    # Advisory conditions (custom logger + rand::rng() reseed) don't apply to sqlx usage.
    "RUSTSEC-2026-0097",
    # rustls-webpki CRL parsing panic. Pulled in transitively via reqwest 0.13 -> rustls.
    # Echo does not use CRL verification, so this code path is unreachable.
    "RUSTSEC-2026-0104",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]

# AGPL-3.0-or-later is the project's own license and must not leak in via
# transitive deps. Narrow exceptions below cover only first-party workspace
# crates so a future AGPL dependency won't silently slip through.
[[licenses.exceptions]]
name = "echo-core"
allow = ["AGPL-3.0-or-later"]

[[licenses.exceptions]]
name = "echo-server"
allow = ["AGPL-3.0-or-later"]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
