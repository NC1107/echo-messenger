name: Rust CI

on:
  pull_request:
    paths:
      - "core/**"
      - "apps/server/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    branches: [main, dev]
    paths:
      - "core/**"
      - "apps/server/**"
      - "Cargo.toml"
      - "Cargo.lock"

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Format + Lint + Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: echo_test
          POSTGRES_USER: echo
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U echo -d echo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: rust-ci
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --workspace
        env:
          DATABASE_URL: postgres://echo:test_password@localhost:5432/echo_test
          JWT_SECRET: ${{ format('{0}{1}', github.run_id, github.run_attempt) }}
      - name: Install cargo-tarpaulin
        if: github.event_name == 'push'
        run: cargo install cargo-tarpaulin --locked
      - name: Generate Rust coverage
        if: github.event_name == 'push'
        run: cargo tarpaulin --workspace --out lcov --output-dir coverage/rust
        env:
          DATABASE_URL: postgres://echo:test_password@localhost:5432/echo_test
          JWT_SECRET: ${{ format('{0}{1}', github.run_id, github.run_attempt) }}
      - name: Upload Rust coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          files: coverage/rust/lcov.info
          flags: rust
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  # ------------------------------------------------------------------
  # Summary gate — require "Rust CI / Summary" in branch protection.
  # Passes only when format, clippy, and all Rust tests have passed.
  # ------------------------------------------------------------------
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [check]
    if: always()
    steps:
      - name: All Rust CI gates passed
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for r in $results; do
            if [ "$r" != "success" ]; then
              echo "::error::One or more Rust CI jobs failed or were skipped (results: $results)"
              exit 1
            fi
          done
          echo "All Rust CI gates passed."
