name: SonarCloud

on:
  pull_request:
  push:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.x'

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    environment: production
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: echo_test
          POSTGRES_USER: echo
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U echo -d echo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      # -- Rust coverage --
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: sonarcloud
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Generate Rust coverage
        run: |
          cargo tarpaulin --workspace --out lcov --output-dir coverage/rust
        env:
          DATABASE_URL: postgres://echo:test_password@localhost:5432/echo_test
          JWT_SECRET: ci-test-secret-do-not-use-in-production

      # -- Flutter coverage --
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Generate Flutter coverage
        working-directory: apps/client
        run: |
          flutter pub get
          flutter test --coverage

      # -- SonarCloud scan --
      - uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
