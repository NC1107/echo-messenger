name: Dev Build

on:
  push:
    branches: [dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'research/**'
      - 'context/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.x'

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev libfuse2 libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-good libsecret-1-dev libayatana-appindicator3-dev
      - name: Build
        working-directory: apps/client
        run: flutter build linux --release --dart-define=APP_VERSION=dev
      - name: Package tar.gz
        run: |
          cd apps/client/build/linux/x64/release/bundle
          tar czf ${{ github.workspace }}/echo-linux-dev.tar.gz .
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dev-linux
          path: echo-linux-dev.tar.gz
          retention-days: 7

  build-macos:
    name: Build macOS
    # macOS runners are 10x cost — only build on manual trigger or weekly
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Disable sandbox for dev build
        run: |
          # Dev builds are unsigned — sandbox blocks Keychain without a valid
          # signing identity. Disable it so flutter_secure_storage works.
          ENT=apps/client/macos/Runner/Release.entitlements
          /usr/libexec/PlistBuddy -c "Set :com.apple.security.app-sandbox false" "$ENT"
          /usr/libexec/PlistBuddy -c "Delete :keychain-access-groups" "$ENT" 2>/dev/null || true
      - name: Build
        working-directory: apps/client
        run: flutter build macos --release --dart-define=APP_VERSION=dev
      - name: Ad-hoc sign
        run: |
          codesign --force --deep --sign - \
            --entitlements apps/client/macos/Runner/Release.entitlements \
            apps/client/build/macos/Build/Products/Release/Echo.app
      - name: Package
        run: |
          cd apps/client/build/macos/Build/Products/Release
          tar czf ${{ github.workspace }}/echo-macos-dev.tar.gz Echo.app
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dev-macos
          path: echo-macos-dev.tar.gz
          retention-days: 7

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build
        working-directory: apps/client
        run: flutter build web --release --pwa-strategy=none --dart-define=APP_VERSION=dev
      - name: Package
        run: |
          cd apps/client/build/web
          tar czf ${{ github.workspace }}/echo-web-dev.tar.gz .
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dev-web
          path: echo-web-dev.tar.gz
          retention-days: 7
