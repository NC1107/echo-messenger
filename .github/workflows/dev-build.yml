name: Dev Build

on:
  push:
    branches: [dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'research/**'
      - 'context/**'

permissions:
  contents: read

concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.x'

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev libfuse2 libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-good libsecret-1-dev
      - name: Build
        working-directory: apps/client
        run: flutter build linux --release --dart-define=APP_VERSION=dev
      - name: Package tar.gz
        run: |
          cd apps/client/build/linux/x64/release/bundle
          tar czf ${{ github.workspace }}/echo-linux-dev.tar.gz .
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dev-linux
          path: echo-linux-dev.tar.gz
          retention-days: 7

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build
        working-directory: apps/client
        run: flutter build web --release --pwa-strategy=none --dart-define=APP_VERSION=dev
      - name: Package
        run: |
          cd apps/client/build/web
          tar czf ${{ github.workspace }}/echo-web-dev.tar.gz .
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dev-web
          path: echo-web-dev.tar.gz
          retention-days: 7
