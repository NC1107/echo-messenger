name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'research/**'
      - 'context/**'
      - 'architecture/**'
      - 'meta/**'

permissions:
  contents: write
  packages: write

env:
  FLUTTER_VERSION: '3.41.x'

jobs:
  lint-test:
    name: Lint + Test Gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: echo_test
          POSTGRES_USER: echo
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U echo -d echo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Rust tests
        run: cargo test --workspace
        env:
          DATABASE_URL: postgres://echo:test_password@localhost:5432/echo_test
          JWT_SECRET: ci-test-secret-do-not-use-in-production
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Flutter dependencies
        working-directory: apps/client
        run: flutter pub get
      - name: Dart format check
        working-directory: apps/client
        run: dart format --set-exit-if-changed .
      - name: Flutter analyze
        working-directory: apps/client
        run: flutter analyze --fatal-infos
      - name: Flutter tests
        working-directory: apps/client
        run: flutter test

  version:
    name: Calculate Version
    needs: [lint-test]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Calculate next version
        id: version
        run: |
          # Get the latest version tag, default to v0.0.0
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          # Strip the 'v' prefix and split
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Increment patch
          PATCH=$((PATCH + 1))

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_TAG (previous: $LATEST)"

  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    needs: [lint-test, version]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev libfuse2 libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-good libsecret-1-dev
      - name: Build
        working-directory: apps/client
        run: flutter build linux --release --dart-define=APP_VERSION=${{ needs.version.outputs.version }}
      - name: Package tar.gz
        run: |
          cd apps/client/build/linux/x64/release/bundle
          tar czf ${{ github.workspace }}/echo-linux-x64.tar.gz .
      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          mkdir -p Echo.AppDir/usr/bin Echo.AppDir/usr/share/applications Echo.AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r apps/client/build/linux/x64/release/bundle/* Echo.AppDir/usr/bin/
          cat > Echo.AppDir/echo.desktop << 'EOF'
          [Desktop Entry]
          Name=Echo
          Comment=Encrypted Messaging
          Exec=echo_app
          Icon=echo
          Type=Application
          Categories=Network;InstantMessaging;
          EOF
          cp Echo.AppDir/echo.desktop Echo.AppDir/usr/share/applications/
          # Placeholder icon
          magick public/white_echo_icon.png -gravity center -background none -extent 1408x1408 -resize 256x256 Echo.AppDir/echo.png || \
          cp public/white_echo_icon.png Echo.AppDir/echo.png
          cp Echo.AppDir/echo.png Echo.AppDir/usr/share/icons/hicolor/256x256/apps/
          cat > Echo.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="${HERE}/usr/bin/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/echo_app" "$@"
          APPRUN
          chmod +x Echo.AppDir/AppRun
          ARCH=x86_64 ./appimagetool --no-appstream Echo.AppDir Echo-x86_64.AppImage || \
          ARCH=x86_64 ./appimagetool Echo.AppDir Echo-x86_64.AppImage
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-linux
          path: |
            echo-linux-x64.tar.gz
            Echo-x86_64.AppImage

  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    needs: [lint-test, version]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build
        working-directory: apps/client
        run: flutter build windows --release --dart-define=APP_VERSION=${{ needs.version.outputs.version }}
      - name: Create InnoSetup script
        shell: pwsh
        run: |
          @"
          [Setup]
          AppName=Echo
          AppVersion=${{ needs.version.outputs.version }}
          AppPublisher=Echo Contributors
          DefaultDirName={autopf}\Echo
          DefaultGroupName=Echo
          OutputDir=.
          OutputBaseFilename=Echo-Setup-x64
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible
          UninstallDisplayIcon={app}\echo_app.exe
          SetupIconFile=

          [Files]
          Source: "apps\client\build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: recursesubdirs

          [Icons]
          Name: "{group}\Echo"; Filename: "{app}\echo_app.exe"
          Name: "{commondesktop}\Echo"; Filename: "{app}\echo_app.exe"
          Name: "{group}\Uninstall Echo"; Filename: "{uninstallexe}"

          [Run]
          Filename: "{app}\echo_app.exe"; Description: "Launch Echo"; Flags: postinstall nowait
          "@ | Out-File -Encoding ASCII echo-setup.iss
      - name: Build installer
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" echo-setup.iss
      - name: Package zip
        shell: pwsh
        run: |
          Compress-Archive -Path apps/client/build/windows/x64/runner/Release/* -DestinationPath echo-windows-x64-portable.zip
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-windows
          path: |
            Echo-Setup-x64.exe
            echo-windows-x64-portable.zip

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [lint-test, version]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Set up signing
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > apps/client/android/echo-release.jks
          echo "$ANDROID_KEY_PROPERTIES" > apps/client/android/key.properties
      - name: Build APK
        working-directory: apps/client
        run: flutter build apk --release --dart-define=APP_VERSION=${{ needs.version.outputs.version }}
      - name: Rename APK
        run: |
          cp apps/client/build/app/outputs/flutter-apk/app-release.apk \
             echo-android-${{ needs.version.outputs.version }}.apk
      - name: Upload Android artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-android
          path: echo-android-*.apk

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: [lint-test, version]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install CocoaPods
        run: gem install cocoapods
      - name: Set up code signing
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
            $(security cms -D -i "$PP_PATH"))
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
      - name: Set up App Store Connect API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
      - name: Configure signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i '' "s/TEAM_ID_PLACEHOLDER/${APPLE_TEAM_ID}/g" \
            apps/client/ios/ExportOptions.plist
          sed -i '' "s/TEAM_ID_PLACEHOLDER/${APPLE_TEAM_ID}/g" \
            apps/client/ios/Runner.xcodeproj/project.pbxproj
      - name: Build IPA
        working-directory: apps/client
        run: |
          flutter pub get
          flutter build ipa --release \
            --build-name=${{ needs.version.outputs.version }} \
            --build-number=${{ github.run_number }} \
            --dart-define=APP_VERSION=${{ needs.version.outputs.version }} \
            --export-options-plist=ios/ExportOptions.plist
      - name: Rename IPA
        run: |
          IPA_FILE=$(find apps/client/build/ios -name "*.ipa" -type f | head -1)
          echo "Found IPA: $IPA_FILE"
          cp "$IPA_FILE" echo-ios-${{ needs.version.outputs.version }}.ipa
      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f echo-ios-${{ needs.version.outputs.version }}.ipa \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
      - name: Upload iOS artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-ios
          path: echo-ios-*.ipa
      - name: Clean up signing
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f ~/private_keys/AuthKey_*.p8 || true

  build-server:
    name: Build Server Binary
    runs-on: ubuntu-latest
    needs: [lint-test, version]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
      - name: Set version in Cargo.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ needs.version.outputs.version }}"/' apps/server/Cargo.toml
          sed -i 's/^version = ".*"/version = "${{ needs.version.outputs.version }}"/' core/rust-core/Cargo.toml
      - name: Build
        run: cargo build --release --package echo-server
      - name: Package
        run: |
          mkdir -p echo-server-pkg
          cp target/release/echo-server echo-server-pkg/
          cp -r apps/server/src/migrations echo-server-pkg/
          cp .env.example echo-server-pkg/
          cd echo-server-pkg && tar czf ${{ github.workspace }}/echo-server-linux-x64.tar.gz .
      - name: Upload server artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-server
          path: echo-server-linux-x64.tar.gz

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint-test, version]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set version in Cargo.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ needs.version.outputs.version }}"/' apps/server/Cargo.toml
          sed -i 's/^version = ".*"/version = "${{ needs.version.outputs.version }}"/' core/rust-core/Cargo.toml
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}/server
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [lint-test, version]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build
        working-directory: apps/client
        run: flutter build web --release --pwa-strategy=none --dart-define=APP_VERSION=${{ needs.version.outputs.version }}
      - name: Package tar.gz
        run: |
          cd apps/client/build/web
          tar czf ${{ github.workspace }}/echo-web.tar.gz .
      - name: Upload web artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-web
          path: echo-web.tar.gz
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}/web
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: apps/client
          file: apps/client/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_ID=${{ github.run_id }}
            APP_VERSION=${{ needs.version.outputs.version }}

  release:
    name: Tag + Publish Release
    runs-on: ubuntu-latest
    needs: [version, build-linux, build-windows, build-android, build-ios, build-web, build-server, docker]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Create and push annotated tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ needs.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ needs.version.outputs.tag }} already exists"
          else
            git tag -a "${{ needs.version.outputs.tag }}" -m "Release ${{ needs.version.outputs.tag }}"
            git push origin "${{ needs.version.outputs.tag }}"
          fi
      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Echo ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: dist/*
