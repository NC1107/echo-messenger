name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'research/**'
      - 'context/**'
      - 'architecture/**'
      - 'meta/**'

permissions:
  contents: write
  packages: write

# #530: serialize release runs on main so two concurrent pushes don't race
# on the version tag and ghcr.io image tags.  cancel-in-progress=false is
# required: cancelling a half-published release leaves orphan tags and
# partial image pushes -- queueing the next push is safer than racing.
concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  security-pre-release:
    name: Security pre-release scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: security-gate
      - run: cargo install cargo-audit --locked
      # Mirrors .github/workflows/security.yml ignore set:
      # RUSTSEC-2023-0071: transitive rsa advisory via jsonwebtoken (no upstream patch).
      # RUSTSEC-2026-0097: rand 0.8.5 unsound advisory, pinned by sqlx 0.8.6 transitively.
      - run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0097
      - uses: EmbarkStudios/cargo-deny-action@175dc7fd4fb85ec8f46948fb98f44db001149081 # v2.0.16

  lint-test:
    name: Lint + Test Gate
    needs: [security-pre-release]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: echo_test
          POSTGRES_USER: echo
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U echo -d echo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: release-lint
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Rust tests
        run: cargo test --workspace
        env:
          DATABASE_URL: postgres://echo:test_password@localhost:5432/echo_test
          JWT_SECRET: ${{ format('ci-test-secret-{0}-attempt-{1}-padding', github.run_id, github.run_attempt) }}
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version-file: .flutter-version
          channel: stable
          cache: true
      - name: Flutter dependencies
        working-directory: apps/client
        run: flutter pub get
      - name: Dart format check
        working-directory: apps/client
        run: dart format --set-exit-if-changed .
      - name: Flutter analyze
        working-directory: apps/client
        run: flutter analyze --fatal-infos
      - name: Flutter tests
        working-directory: apps/client
        run: flutter test

  version:
    name: Calculate Version
    needs: [lint-test]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Reserve next version tag (atomic)
        id: version
        # #530: reserve the tag IMMEDIATELY (before expensive builds) so
        # downstream jobs reference a real persistent tag.  The retry loop
        # complements the workflow-level concurrency group by handling
        # manual `git push origin vX.Y.Z` between CI runs without aborting
        # the release.  If a build later fails the orphan tag is left in
        # place; the next release auto-bumps past it.
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --quiet origin

          PUSH_ERR=$(mktemp)
          trap 'rm -f "$PUSH_ERR"' EXIT

          for attempt in 1 2 3 4 5; do
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              LATEST="v0.0.0"
            fi

            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))

            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            NEW_TAG="v${NEW_VERSION}"

            # Idempotency: if a prior attempt of this same step already
            # pushed the tag (e.g. step retry, runner restart), short-
            # circuit to success rather than re-tagging and aborting.
            if git ls-remote --exit-code --tags origin "refs/tags/$NEW_TAG" >/dev/null 2>&1; then
              REMOTE_SHA=$(git ls-remote --tags origin "refs/tags/$NEW_TAG" | awk '{print $1}')
              LOCAL_SHA=$(git rev-parse HEAD)
              if [ "$REMOTE_SHA" = "$LOCAL_SHA" ] || git merge-base --is-ancestor "$LOCAL_SHA" "$REMOTE_SHA" 2>/dev/null; then
                echo "Tag $NEW_TAG already reserved by this run; skipping push"
                echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
                echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              # Tag exists but points elsewhere -- bump and retry.
              git fetch --tags --quiet origin
              continue
            fi

            git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
            if git push origin "$NEW_TAG" 2>"$PUSH_ERR"; then
              echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
              echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
              echo "Reserved $NEW_TAG (previous: $LATEST, attempt $attempt)"
              exit 0
            fi

            echo "Push of $NEW_TAG lost a race (attempt $attempt):"
            cat "$PUSH_ERR" || true
            git tag -d "$NEW_TAG"
            git fetch --tags --quiet origin
          done

          echo "::error::Failed to reserve a release tag after 5 attempts"
          exit 1

  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    needs: [lint-test, version]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version-file: .flutter-version
          channel: stable
          cache: true
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev libfuse2 libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-good libsecret-1-dev libayatana-appindicator3-dev
      - name: Build
        working-directory: apps/client
        run: flutter build linux --release --dart-define=APP_VERSION=${{ needs.version.outputs.version }}
      - name: Package tar.gz
        run: |
          cd apps/client/build/linux/x64/release/bundle
          tar czf ${{ github.workspace }}/echo-linux-x64.tar.gz .
      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          mkdir -p Echo.AppDir/usr/bin Echo.AppDir/usr/share/applications Echo.AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r apps/client/build/linux/x64/release/bundle/* Echo.AppDir/usr/bin/
          cat > Echo.AppDir/echo.desktop << 'EOF'
          [Desktop Entry]
          Name=Echo
          Comment=Encrypted Messaging
          Exec=echo_app
          Icon=echo
          Type=Application
          Categories=Network;InstantMessaging;
          StartupNotify=true
          StartupWMClass=com.echo.echo_app
          EOF
          cp Echo.AppDir/echo.desktop Echo.AppDir/usr/share/applications/
          # Placeholder icon
          magick public/white_echo_icon.png -gravity center -background none -extent 1408x1408 -resize 256x256 Echo.AppDir/echo.png || \
          cp public/white_echo_icon.png Echo.AppDir/echo.png
          cp Echo.AppDir/echo.png Echo.AppDir/usr/share/icons/hicolor/256x256/apps/
          cat > Echo.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="${HERE}/usr/bin/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/echo_app" "$@"
          APPRUN
          chmod +x Echo.AppDir/AppRun
          ARCH=x86_64 ./appimagetool --no-appstream Echo.AppDir Echo-x86_64.AppImage || \
          ARCH=x86_64 ./appimagetool Echo.AppDir Echo-x86_64.AppImage
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-linux
          path: |
            echo-linux-x64.tar.gz
            Echo-x86_64.AppImage
          retention-days: 3

  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    needs: [lint-test, version]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version-file: .flutter-version
          channel: stable
          cache: true
      - name: Build
        working-directory: apps/client
        run: flutter build windows --release --dart-define=APP_VERSION=${{ needs.version.outputs.version }}
      - name: Create InnoSetup script
        shell: pwsh
        run: |
          @"
          [Setup]
          AppName=Echo
          AppVersion=${{ needs.version.outputs.version }}
          AppPublisher=Echo Contributors
          DefaultDirName={autopf}\Echo
          DefaultGroupName=Echo
          OutputDir=.
          OutputBaseFilename=Echo-Setup-x64
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible
          UninstallDisplayIcon={app}\echo_app.exe
          SetupIconFile=

          [Files]
          Source: "apps\client\build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: recursesubdirs

          [Icons]
          Name: "{group}\Echo"; Filename: "{app}\echo_app.exe"
          Name: "{commondesktop}\Echo"; Filename: "{app}\echo_app.exe"
          Name: "{group}\Uninstall Echo"; Filename: "{uninstallexe}"

          [Run]
          Filename: "{app}\echo_app.exe"; Description: "Launch Echo"; Flags: postinstall nowait
          "@ | Out-File -Encoding ASCII echo-setup.iss
      - name: Build installer
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" echo-setup.iss
      - name: Package zip
        shell: pwsh
        run: |
          Compress-Archive -Path apps/client/build/windows/x64/runner/Release/* -DestinationPath echo-windows-x64-portable.zip
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-windows
          path: |
            Echo-Setup-x64.exe
            echo-windows-x64-portable.zip
          retention-days: 3

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [lint-test, version]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version-file: .flutter-version
          channel: stable
          cache: true
      - name: Check signing secrets
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEY_PROPERTIES" ]; then
            echo "::warning::Android signing secrets missing. Skipping Android build (no unsigned APKs will be produced)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up signing
        if: steps.signing.outputs.skip != 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > apps/client/android/echo-release.jks
          echo "$ANDROID_KEY_PROPERTIES" > apps/client/android/key.properties
      - name: Build APK
        if: steps.signing.outputs.skip != 'true'
        working-directory: apps/client
        run: flutter build apk --release --dart-define=APP_VERSION=${{ needs.version.outputs.version }}
      - name: Rename APK
        if: steps.signing.outputs.skip != 'true'
        run: |
          cp apps/client/build/app/outputs/flutter-apk/app-release.apk \
             echo-android-${{ needs.version.outputs.version }}.apk
      - name: Upload Android artifact
        if: steps.signing.outputs.skip != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-android
          path: echo-android-*.apk
          retention-days: 3

  build-ios:
    name: Build iOS IPA
    runs-on: macos-15
    needs: [lint-test, version]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version-file: .flutter-version
          channel: stable
          cache: true
      - name: Select latest Xcode
        run: |
          # Find the highest-versioned Xcode on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selected Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
      - name: Install CocoaPods
        run: gem install cocoapods
      - name: Verify iOS signing secrets present
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$IOS_CERTIFICATE_BASE64" ] || [ -z "$IOS_CERTIFICATE_PASSWORD" ] || [ -z "$IOS_PROVISIONING_PROFILE_BASE64" ]; then
            echo "::error::iOS signing secrets missing. Refusing to ship unsigned IPA."
            exit 1
          fi
      - name: Set up code signing
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_BROADCAST_PROFILE_BASE64: ${{ secrets.IOS_BROADCAST_PROFILE_BASE64 }}
          IOS_NOTIFICATION_SERVICE_PROFILE_BASE64: ${{ secrets.IOS_NOTIFICATION_SERVICE_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          BROADCAST_PP_PATH=$RUNNER_TEMP/build_broadcast_pp.mobileprovision
          NOTIF_PP_PATH=$RUNNER_TEMP/build_notif_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          echo "$IOS_BROADCAST_PROFILE_BASE64" | base64 --decode > "$BROADCAST_PP_PATH"
          echo "$IOS_NOTIFICATION_SERVICE_PROFILE_BASE64" | base64 --decode > "$NOTIF_PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Install main app provisioning profile
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
            $(security cms -D -i "$PP_PATH"))
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision

          # Install broadcast extension provisioning profile
          BROADCAST_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
            $(security cms -D -i "$BROADCAST_PP_PATH"))
          cp "$BROADCAST_PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${BROADCAST_UUID}.mobileprovision

          # Install notification service extension provisioning profile
          NOTIF_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
            $(security cms -D -i "$NOTIF_PP_PATH"))
          cp "$NOTIF_PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${NOTIF_UUID}.mobileprovision
      - name: Set up App Store Connect API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
      - name: Configure signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i '' "s/TEAM_ID_PLACEHOLDER/${APPLE_TEAM_ID}/g" \
            apps/client/ios/ExportOptions.plist
          sed -i '' "s/TEAM_ID_PLACEHOLDER/${APPLE_TEAM_ID}/g" \
            apps/client/ios/Runner.xcodeproj/project.pbxproj
      - name: Build IPA
        working-directory: apps/client
        run: |
          flutter pub get
          flutter build ipa --release \
            --build-name=${{ needs.version.outputs.version }} \
            --build-number=${{ github.run_number }} \
            --dart-define=APP_VERSION=${{ needs.version.outputs.version }} \
            --export-options-plist=ios/ExportOptions.plist
      - name: Rename IPA
        run: |
          IPA_FILE=$(find apps/client/build/ios -name "*.ipa" -type f | head -1)
          echo "Found IPA: $IPA_FILE"
          cp "$IPA_FILE" echo-ios-${{ needs.version.outputs.version }}.ipa
      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f echo-ios-${{ needs.version.outputs.version }}.ipa \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
      - name: Upload iOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-ios
          path: echo-ios-*.ipa
          retention-days: 3
      - name: Clean up signing
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f ~/private_keys/AuthKey_*.p8 || true

  build-macos:
    name: Build macOS Desktop
    runs-on: macos-15
    needs: [lint-test, version]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version-file: .flutter-version
          channel: stable
          cache: true
      - name: Build
        working-directory: apps/client
        run: flutter build macos --release --dart-define=APP_VERSION=${{ needs.version.outputs.version }}
      - name: Package DMG
        run: |
          cd apps/client/build/macos/Build/Products/Release
          # Create a simple tar.gz for now (DMG creation needs create-dmg tool)
          tar czf ${{ github.workspace }}/echo-macos-x64.tar.gz Echo.app
      - name: Upload macOS artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-macos
          path: echo-macos-x64.tar.gz
          retention-days: 3

  build-server:
    name: Build Server Binary
    runs-on: ubuntu-latest
    needs: [lint-test, version]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: release-build
      - name: Set version in Cargo.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ needs.version.outputs.version }}"/' apps/server/Cargo.toml
          sed -i 's/^version = ".*"/version = "${{ needs.version.outputs.version }}"/' core/rust-core/Cargo.toml
      - name: Build
        run: cargo build --release --package echo-server
      - name: Package
        run: |
          mkdir -p echo-server-pkg
          cp target/release/echo-server echo-server-pkg/
          cp -r apps/server/src/migrations echo-server-pkg/
          cp .env.example echo-server-pkg/
          cd echo-server-pkg && tar czf ${{ github.workspace }}/echo-server-linux-x64.tar.gz .
      - name: Upload server artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-server
          path: echo-server-linux-x64.tar.gz
          retention-days: 3

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint-test, version]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set version in Cargo.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ needs.version.outputs.version }}"/' apps/server/Cargo.toml
          sed -i 's/^version = ".*"/version = "${{ needs.version.outputs.version }}"/' core/rust-core/Cargo.toml
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}/server
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [lint-test, version]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version-file: .flutter-version
          channel: stable
          cache: true
      - name: Build
        working-directory: apps/client
        run: flutter build web --release --pwa-strategy=none --dart-define=APP_VERSION=${{ needs.version.outputs.version }}
      - name: Package tar.gz
        run: |
          cd apps/client/build/web
          tar czf ${{ github.workspace }}/echo-web.tar.gz .
      - name: Upload web artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-web
          path: echo-web.tar.gz
          retention-days: 3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}/web
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: apps/client
          file: apps/client/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_ID=${{ github.run_id }}
            APP_VERSION=${{ needs.version.outputs.version }}

  release:
    name: Tag + Publish Release
    runs-on: ubuntu-latest
    needs: [version, build-linux, build-windows, build-macos, build-android, build-ios, build-web, build-server, docker]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      # Tag is already reserved by the `version` job (#530).
      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Echo ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: dist/*
