name: Release

on:
  push:
    tags: ['v*']
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  FLUTTER_VERSION: '3.41.x'

jobs:
  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev libfuse2
      - name: Build
        working-directory: apps/client
        run: flutter build linux --release
      - name: Package tar.gz
        run: |
          cd apps/client/build/linux/x64/release/bundle
          tar czf ${{ github.workspace }}/echo-linux-x64.tar.gz .
      - name: Build AppImage
        run: |
          # Download appimagetool
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          # Create AppDir structure
          mkdir -p Echo.AppDir/usr/bin
          mkdir -p Echo.AppDir/usr/lib
          mkdir -p Echo.AppDir/usr/share/applications
          mkdir -p Echo.AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy Flutter bundle
          cp -r apps/client/build/linux/x64/release/bundle/* Echo.AppDir/usr/bin/

          # Create desktop file
          cat > Echo.AppDir/usr/share/applications/echo.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Echo
          Comment=Encrypted Messaging
          Exec=echo_app
          Icon=echo
          Type=Application
          Categories=Network;InstantMessaging;
          DESKTOP
          cp Echo.AppDir/usr/share/applications/echo.desktop Echo.AppDir/echo.desktop

          # Create a simple icon (placeholder)
          convert -size 256x256 xc:'#4338CA' -fill white -gravity center -pointsize 72 -annotate 0 'E' Echo.AppDir/usr/share/icons/hicolor/256x256/apps/echo.png 2>/dev/null || \
          echo "" | base64 -d > Echo.AppDir/usr/share/icons/hicolor/256x256/apps/echo.png
          cp Echo.AppDir/usr/share/icons/hicolor/256x256/apps/echo.png Echo.AppDir/echo.png

          # Create AppRun
          cat > Echo.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="${HERE}/usr/bin/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/echo_app" "$@"
          APPRUN
          chmod +x Echo.AppDir/AppRun

          # Build AppImage
          ARCH=x86_64 ./appimagetool --no-appstream Echo.AppDir Echo-x86_64.AppImage || \
          ARCH=x86_64 ./appimagetool Echo.AppDir Echo-x86_64.AppImage
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: |
            echo-linux-x64.tar.gz
            Echo-x86_64.AppImage

  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build
        working-directory: apps/client
        run: flutter build windows --release
      - name: Create InnoSetup script
        shell: pwsh
        run: |
          @"
          [Setup]
          AppName=Echo
          AppVersion=0.1.0
          AppPublisher=Echo Contributors
          DefaultDirName={autopf}\Echo
          DefaultGroupName=Echo
          OutputDir=.
          OutputBaseFilename=Echo-Setup-x64
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible
          UninstallDisplayIcon={app}\echo_app.exe
          SetupIconFile=

          [Files]
          Source: "apps\client\build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: recursesubdirs

          [Icons]
          Name: "{group}\Echo"; Filename: "{app}\echo_app.exe"
          Name: "{commondesktop}\Echo"; Filename: "{app}\echo_app.exe"
          Name: "{group}\Uninstall Echo"; Filename: "{uninstallexe}"

          [Run]
          Filename: "{app}\echo_app.exe"; Description: "Launch Echo"; Flags: postinstall nowait
          "@ | Out-File -Encoding ASCII echo-setup.iss
      - name: Build installer
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" echo-setup.iss
      - name: Package zip
        shell: pwsh
        run: |
          Compress-Archive -Path apps/client/build/windows/x64/runner/Release/* -DestinationPath echo-windows-x64-portable.zip
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: |
            Echo-Setup-x64.exe
            echo-windows-x64-portable.zip

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build
        working-directory: apps/client
        run: flutter build web --release
      - name: Package
        run: |
          cd apps/client/build/web
          tar czf ${{ github.workspace }}/echo-web.tar.gz .
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: echo-web.tar.gz

  build-server:
    name: Build Server Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --package echo-server
      - name: Package
        run: |
          mkdir -p echo-server-pkg
          cp target/release/echo-server echo-server-pkg/
          cp -r apps/server/src/migrations echo-server-pkg/
          cp .env.example echo-server-pkg/
          cd echo-server-pkg && tar czf ${{ github.workspace }}/echo-server-linux-x64.tar.gz .
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: echo-server-linux-x64.tar.gz

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/server
          tags: |
            type=sha,prefix=
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-web:
    name: Build Web Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build web
        working-directory: apps/client
        run: flutter build web --release
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/web
          tags: |
            type=sha,prefix=
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: apps/client
          file: apps/client/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
