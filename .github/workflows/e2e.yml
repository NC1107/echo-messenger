name: E2E Tests

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'research/**'
      - 'context/**'
      - 'architecture/**'
      - 'meta/**'
      - 'CLAUDE.md'
  push:
    branches: [main, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'research/**'
      - 'context/**'
      - 'architecture/**'
      - 'meta/**'
      - 'CLAUDE.md'

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.x"

jobs:
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: echo_test
          POSTGRES_USER: echo
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U echo -d echo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # -- Rust server --
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          shared-key: e2e
      - name: Build server
        run: cargo build --release --package echo-server

      # -- Flutter web --
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Build web client
        working-directory: apps/client
        run: |
          flutter pub get
          flutter build web --release --pwa-strategy=none --dart-define=APP_VERSION=0.0.0-e2e

      # -- Start services --
      - name: Start server
        run: |
          ./target/release/echo-server &
          sleep 5
          curl --retry 10 --retry-delay 2 --retry-connrefused -s http://localhost:8080/api/health
        env:
          DATABASE_URL: postgres://echo:test_password@localhost:5432/echo_test
          JWT_SECRET: ci-e2e-secret-do-not-use-in-production
          RUST_LOG: echo_server=info
          SERVER_HOST: 0.0.0.0
          SERVER_PORT: 8080
          CORS_ORIGINS: http://localhost:8081

      - name: Install serve
        run: npm install -g serve

      - name: Serve web client
        run: |
          serve -s apps/client/build/web -l 8081 &
          sleep 3
          curl --retry 10 --retry-delay 2 --retry-connrefused -sf http://localhost:8081/ > /dev/null

      # -- Playwright --
      - name: Install Playwright dependencies
        working-directory: tests/e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: tests/e2e
        run: npx playwright test ./local_full.spec.ts
        env:
          DATABASE_URL: postgres://echo:test_password@localhost:5432/echo_test
          JWT_SECRET: ci-e2e-secret-do-not-use-in-production

      - name: Upload test artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: e2e-results
          path: |
            tests/e2e/test-results/
          retention-days: 7
