name: Security

on:
  pull_request:
  push:
    branches: [main, dev]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - run: cargo install cargo-audit --locked
      # RUSTSEC-2023-0071: transitive rsa advisory via jsonwebtoken (no upstream patch).
      # RUSTSEC-2026-0097: rand 0.8.5 unsound advisory, pinned by sqlx 0.8.6 transitively.
      - run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0097
  deny:
    name: License + Ban Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: EmbarkStudios/cargo-deny-action@175dc7fd4fb85ec8f46948fb98f44db001149081 # v2.0.16
  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      # On pull_request, trufflehog auto-detects base/head from the event
      # context.  On push the action's defaults can fall back to scanning the
      # working tree only, missing historical secrets in a single squash
      # commit.  Pass the explicit range so push events scan the new commits.
      - name: Scan for secrets (pull_request)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26 # v3.95.2
        with:
          extra_args: --only-verified
      - name: Scan for secrets (push)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26 # v3.95.2
        with:
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified
